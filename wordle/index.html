<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clickable Wordle Grid</title>
      <link rel="stylesheet" href="https://jasoncheng.me/fonts/fonts.css" />
      <link rel="stylesheet" href="wordle.css" />
</head>
<body>
    <h1>Wordle Art</h1>
    <div class="subtitle">Click squares to toggle white ↔ green</div>
    
    <div class="grid-container" id="grid"></div>

    <div class="controls">
        <button class="go-btn">Go</button>
        <button onclick="resetGrid()">Clear All</button>
        <button class="secondary" onclick="randomize()">Random</button>
    </div>

    <div class="stats" id="stats">Green tiles: 0 / 30</div>

    <button style="opacity: 0.8; transform-origin: right; transform: scale(0.8); background-color: white; color: black; border-style: solid; border-width: 1px; border-color: black" id="switch-fonts">
        Switch Fonts
    </button>
    <script src="https://jasoncheng.me/assets/switchfonts.js"></script>
    <script src="patternmatcher.js"></script>

    <script>
        const ROWS = 6;
        const COLS = 5;
        const grid = document.getElementById('grid');
        const stats = document.getElementById('stats');

        function initGrid() {
            for (let i = 0; i < ROWS; i++) {
                const row = document.createElement('div');
                row.className = 'row';
                
                for (let j = 0; j < COLS; j++) {
                    const tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.dataset.row = i;
                    tile.dataset.col = j;
                    tile.tabIndex = 0;
                    tile.setAttribute('role', 'button');
                    tile.setAttribute('aria-label', `Row ${i + 1}, Column ${j + 1}, empty`);
                    
                    tile.addEventListener('click', () => toggleTile(tile));
                    
                    tile.addEventListener('keydown', (e) => {
                        if (e.key === 'Enter' || e.key === ' ') {
                            e.preventDefault();
                            toggleTile(tile);
                        }
                    });
                    
                    row.appendChild(tile);
                }
                grid.appendChild(row);
            }
        }

        function toggleTile(tile) {
            const isGreen = tile.classList.toggle('green');
            const row = parseInt(tile.dataset.row) + 1;
            const col = parseInt(tile.dataset.col) + 1;
            
            tile.setAttribute('aria-label', 
                `Row ${row}, Column ${col}, ${isGreen ? 'green' : 'empty'}`
            );
            
            updateStats();
        }

        function resetGrid() {
            document.querySelectorAll('.tile').forEach(tile => {
                tile.classList.remove('green');
                const row = parseInt(tile.dataset.row) + 1;
                const col = parseInt(tile.dataset.col) + 1;
                tile.setAttribute('aria-label', `Row ${row}, Column ${col}, empty`);
            });
            updateStats();
        }

        function randomize() {
            document.querySelectorAll('.tile').forEach(tile => {
                const isGreen = Math.random() > 0.7; // 30% chance of green
                if (isGreen) {
                    tile.classList.add('green');
                } else {
                    tile.classList.remove('green');
                }
                const row = parseInt(tile.dataset.row) + 1;
                const col = parseInt(tile.dataset.col) + 1;
                tile.setAttribute('aria-label', 
                    `Row ${row}, Column ${col}, ${isGreen ? 'green' : 'empty'}`
                );
            });
            updateStats();
        }

        function updateStats() {
            const greenCount = document.querySelectorAll('.tile.green').length;
            stats.textContent = `Green tiles: ${greenCount} / ${ROWS * COLS}`;
        }

        // Initialize on load
        initGrid();
    </script>
</body>
</html>
